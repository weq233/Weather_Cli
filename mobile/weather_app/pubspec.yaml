name: weather_app
description: A beautiful weather app for Weather CLI API
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP 请求
  http: ^1.1.0
  
  # 状态管理
  provider: ^6.1.1
  
  # UI 组件
  cupertino_icons: ^1.0.2
  flutter_spinkit: ^5.2.0
  
  # 工具
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  
  # 图标
  font_awesome_flutter: ^10.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # 字体配置（可选）
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
